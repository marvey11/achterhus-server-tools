name: Auto-fix Linting Issues

on: [pull_request]

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Check if uv.lock is out of sync
        # This will fail the CI immediately if pyproject.toml and uv.lock don't match
        run: uv lock --check

      - name: Verify and Sync Dependencies
        # This ensures the lockfile is up to date and the environment is ready
        run: uv sync --frozen

      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py3.12-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py3.12-

      - name: Run pre-commit and auto-fix
        run: uv run pre-commit run --all-files || true

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-fix linting issues"
          branch: ${{ github.head_ref }}
          # Optional: stops the job if no changes were made
          skip_dirty_check: false
