name: CI Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip' # Speeds up subsequent runs

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run Ruff (Linting)
        run: ruff check .

      - name: Run Mypy (Type Checking)
        # We set PYTHONPATH=. so mypy finds your 'lib' folder correctly
        run: mypy .

      - name: Run ShellCheck
        run: |
          sudo apt-get install -y shellcheck
          # create a dummy .env so shellcheck can "follow" the source command
          touch .env
          shellcheck bin/*.sh
